# Project Configuration — AI YouTube Studio OS
# This file is the project-level config for a single production run.
# Fill in the REQUIRED fields. All others are optional overrides.

project:
  topic: ""                    # REQUIRED
  language: ""                 # REQUIRED: en / ja / vi
  video_length_minutes: 0      # REQUIRED: 5–60
  style: ""                    # REQUIRED: dark_documentary / reddit_narration / mystery_investigation / japanese_mystery
  niche: ""                    # Optional: auto-derived from style
  channel_name: ""             # Optional: used in SEO, never in narration
  notes: ""                    # Optional: extra Director AI instructions

pipeline:
  start_stage: 0
  stop_after_stage: 12
  max_retries_per_stage: 1
  halt_on_advisory: false

quality:
  word_count_tolerance: 0.10
  min_verified_facts: 5
  min_sources: 3
  require_source_pass: false

models:
  primary: "claude-opus-4-8"
  secondary: "claude-sonnet-4-6"
  stage_overrides: {}

images:
  max_ai_escalation_rate: 0.50
  minimum_license: "cc_by"
  allow_fair_use: true

voice:
  elevenlabs_voice_id: ""

seo:
  tag_count_min: 15
  tag_count_max: 30
  extra_tags: []

export:
  bundle_export_assets: true
  include_run_log: true
  generate_editor_handoff: true

analytics:
  write_to_memory: true
  project_tags: []

schema_version: "1.0"
